# Local-storage override - run the stack against MinIO instead of real S3,
# for fast/offline development. Cloud mode (real S3) is the default:
#
#   make up          -> real S3 (docker compose up -d --build)
#   make up-local    -> MinIO   (docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build)
#
# The miniodata volume persists across mode switches, so flipping back and
# forth loses nothing that was uploaded in local mode. Objects uploaded in
# cloud mode live only in S3, though - to pull them down before going
# offline:
#
#   aws s3 sync s3://blueprintai-files-719287409727 /tmp/blueprintai-files
#   aws --endpoint-url http://localhost:9000 s3 sync /tmp/blueprintai-files s3://blueprintai-files \
#     --profile local   # or AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin
#
# AI stays on Bedrock here (needs internet). For a fully offline session set
# AI_PROVIDER=ollama too - but note switching embedders means the knowledge
# base must be re-embedded, so don't flip it casually.

services:
  minio:
    image: minio/minio
    container_name: blueprintai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # one-shot: create the bucket the app expects, then exit
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/blueprintai-files &&
      echo 'bucket ready'"

  backend:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      # local docker Postgres instead of RDS (empty secret id disables the
      # Secrets Manager lookup)
      DATABASE_SECRET_ID: ""
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blueprintai
      S3_BUCKET: blueprintai-files
      S3_ENDPOINT_URL: http://minio:9000
      # what the user's browser can reach - used only for presigned URLs
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

volumes:
  miniodata:
