# BlueprintAI local infrastructure - the whole stack with one command:
#   make up      (or: docker compose up -d --build)
#
# Ollama runs NATIVELY on the host (brew services start ollama) rather than in
# a container: Docker on macOS cannot use the Apple GPU, and the vision model
# is unusably slow on CPU. The backend container reaches it via
# host.docker.internal. Pull the models once with: make models
#
# The frontend build context is the sibling checkout ../BlueprintAI-frontend.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: blueprintai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blueprintai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blueprintai"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio
    container_name: blueprintai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # one-shot: create the bucket the app expects, then exit
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/blueprintai-files &&
      echo 'bucket ready'"

  backend:
    build: .
    container_name: blueprintai-backend
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blueprintai
      S3_ENDPOINT_URL: http://minio:9000
      # what the user's browser can reach - used only for presigned URLs
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Bedrock models (Claude vision/generation + Titan embeddings); flip
      # back to "ollama" for fully offline development
      AI_PROVIDER: bedrock
      AWS_REGION: us-east-1
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compatibility
    volumes:
      # aws login session so the container can call Bedrock; read-write
      # because the credential provider refreshes its token cache in
      # ~/.aws/login/cache. Requires botocore[crt] (see requirements.txt)
      - ~/.aws:/root/.aws
    ports:
      - "8000:8000"

  frontend:
    build: ../BlueprintAI-frontend
    container_name: blueprintai-frontend
    depends_on:
      - backend
    ports:
      - "5175:80"

volumes:
  pgdata:
  miniodata:
