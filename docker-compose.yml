# BlueprintAI local infrastructure - the whole stack with one command:
#   make up      (or: docker compose up -d --build)
#
# Ollama runs NATIVELY on the host (brew services start ollama) rather than in
# a container: Docker on macOS cannot use the Apple GPU, and the vision model
# is unusably slow on CPU. The backend container reaches it via
# host.docker.internal. Pull the models once with: make models
#
# The frontend build context is the sibling checkout ../BlueprintAI-frontend.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: blueprintai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blueprintai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blueprintai"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    container_name: blueprintai-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # RDS (Phase B database): credentials resolve from Secrets Manager at
      # startup - no password in this file. make up-local overrides this back
      # to the local docker Postgres.
      DATABASE_SECRET_ID: blueprintai/db
      DATABASE_HOST: blueprintai-db.ccj86qq8ymmj.us-east-1.rds.amazonaws.com
      # Real S3 (Phase B storage). For local/offline development run
      # `make up-local` - it layers docker-compose.local.yml, which brings
      # MinIO back and points the backend at it. See that file for details.
      S3_BUCKET: blueprintai-files-719287409727
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Bedrock models (Claude vision/generation + Titan embeddings); flip
      # back to "ollama" for fully offline development
      AI_PROVIDER: bedrock
      AWS_REGION: us-east-1
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compatibility
    volumes:
      # aws login session so the container can call Bedrock; read-write
      # because the credential provider refreshes its token cache in
      # ~/.aws/login/cache. Requires botocore[crt] (see requirements.txt)
      - ~/.aws:/root/.aws
    ports:
      - "8000:8000"

  frontend:
    build: ../BlueprintAI-frontend
    container_name: blueprintai-frontend
    depends_on:
      - backend
    ports:
      - "5175:80"

volumes:
  pgdata:
