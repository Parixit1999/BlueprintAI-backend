AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  BlueprintAI object storage - originals and rendered drawing pages.
  Private bucket; the app hands out short-lived presigned URLs.

Parameters:
  BucketName:
    Type: String
    Description: Globally unique bucket name (account id suffix recommended)

Resources:
  FilesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

Outputs:
  BucketName:
    Value: !Ref FilesBucket
